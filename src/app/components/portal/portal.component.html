<section class="portal-page">
  <div class="portal-card">
    <span class="portal-eyebrow">Protected Area</span>
    <h1>Welcome to the DataGrad Portal</h1>

      This page is guarded. Anyone opening the portal route must pass the login page first.

    </div>
  </div>
</section>
